<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Dashboard</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Stay updated with the latest Google Cloud BigQuery releases, features, issue fixes, and changes. Easily review and share updates.">
    <!-- Google Fonts -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header>
            <div class="brand-section">
                <div class="logo-wrapper">
                    <!-- BigQuery/Database modern outline icon -->
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                        <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"></path>
                    </svg>
                </div>
                <div>
                    <h1>BigQuery Release Notes</h1>
                    <div class="subtitle">Real-time updates & announcement digest</div>
                </div>
            </div>
            
            <div class="actions-panel">
                <div class="feed-status">
                    <span class="status-dot"></span>
                    <span id="feed-status-text">Last synced: Just now</span>
                </div>
                <button id="theme-toggle" class="btn" aria-label="Toggle theme" title="Toggle Light/Dark Theme">
                    <svg class="theme-icon-sun" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.07" x2="5.64" y2="17.66"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="theme-icon-moon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button id="export-csv-btn" class="btn" aria-label="Export to CSV" title="Export current filtered view to CSV">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span class="btn-text">Export CSV</span>
                </button>
                <button id="refresh-btn" class="btn btn-primary" aria-label="Sync release notes">
                    <svg class="spinner" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="2" x2="12" y2="6"></line>
                        <line x1="12" y1="18" x2="12" y2="22"></line>
                        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
                        <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
                        <line x1="2" y1="12" x2="6" y2="12"></line>
                        <line x1="18" y1="12" x2="22" y2="12"></line>
                        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
                        <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
                    </svg>
                    <span class="btn-text">Refresh Feed</span>
                </button>
            </div>
        </header>

        <!-- Stats Overview Cards -->
        <section class="stats-grid" aria-label="Release Metrics">
            <div class="stat-card" style="--stat-color: var(--primary)">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total Updates</div>
            </div>
            <div class="stat-card" style="--stat-color: var(--color-feature)">
                <div class="stat-value" id="stat-features">0</div>
                <div class="stat-label">Features</div>
            </div>
            <div class="stat-card" style="--stat-color: var(--color-issue)">
                <div class="stat-value" id="stat-issues">0</div>
                <div class="stat-label">Known Issues</div>
            </div>
            <div class="stat-card" style="--stat-color: var(--color-change)">
                <div class="stat-value" id="stat-changes">0</div>
                <div class="stat-label">Changes & deprecations</div>
            </div>
        </section>

        <!-- Filter & Search Section -->
        <section class="filters-bar" aria-label="Controls">
            <div class="filter-tabs" role="tablist">
                <button class="filter-tab active" role="tab" aria-selected="true" data-filter="all">All updates</button>
                <button class="filter-tab" role="tab" aria-selected="false" data-filter="feature">Features</button>
                <button class="filter-tab" role="tab" aria-selected="false" data-filter="issue">Issues</button>
                <button class="filter-tab" role="tab" aria-selected="false" data-filter="change">Changes</button>
                <button class="filter-tab" role="tab" aria-selected="false" data-filter="announcement">Announcements</button>
            </div>
            
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" rx="8" ry="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Search release notes..." aria-label="Search release notes">
            </div>
        </section>

        <!-- Main Content Area -->
        <main id="updates-container" class="updates-grid" aria-live="polite">
            <!-- Dynamic updates will be injected here -->
        </main>
    </div>

    <!-- Floating Selection Action Bar -->
    <div id="floating-bar" class="floating-bar" role="toolbar" aria-label="Bulk actions">
        <div class="floating-info" id="floating-info">0 updates selected</div>
        <div class="floating-buttons">
            <button id="clear-selection-btn" class="btn">Clear</button>
            <button id="tweet-selected-btn" class="btn btn-twitter">
                <!-- X / Twitter SVG Icon -->
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                Tweet Selected
            </button>
        </div>
    </div>

    <!-- Main JavaScript Code -->
    <script src="/static/js/app.js"></script>
</body>
</html>
